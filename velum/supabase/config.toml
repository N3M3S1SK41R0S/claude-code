# Configuration Supabase CLI (dev local). `supabase start` monte la stack ;
# `supabase db reset` applique migrations/*.sql PUIS seed.sql (compte démo).
project_id = "velum"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
# Boîte mail locale (liens de confirmation, réinitialisation de mot de passe).
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["velum://", "http://localhost:8081"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Dev : pas de confirmation e-mail pour tester vite (à activer en prod).
enable_confirmations = false

# OAuth (Apple / Google) — renseigner les identifiants en prod, désactivé en local.
[auth.external.apple]
enabled = false
[auth.external.google]
enabled = false

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true

# Fonctions utilisateur : le gateway exige un JWT avant le handler.
[functions.recognize]
verify_jwt = true
[functions.analyze-wine]
verify_jwt = true
[functions.analyze-coin]
verify_jwt = true
[functions.analyze-art]
verify_jwt = true
[functions.analyze-stamp]
verify_jwt = true
[functions.valuate]
verify_jwt = true
[functions.cellar-pairing]
verify_jwt = true
[functions.arbiter]
verify_jwt = true
[functions.delete-account]
verify_jwt = true

# Fonctions mixtes ou internes : leur handler vérifie le secret cron/webhook.
# `calibration` doit laisser passer le POST cron sans JWT ; son GET reste
# protégé par la RLS et transmet le Bearer utilisateur lorsqu'il est présent.
[functions.calibration]
verify_jwt = false
[functions.price-cron]
verify_jwt = false
[functions.revenuecat-webhook]
verify_jwt = false
