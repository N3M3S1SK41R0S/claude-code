name: Audit ponctuel des usages de fiabilité

on:
  push:
    branches:
      - agent/velum-distinct-source-reliability
    paths:
      - .github/workflows/agent-audit-reliability.yml

permissions:
  contents: write

jobs:
  audit-reliability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/velum-distinct-source-reliability
          fetch-depth: 0

      - name: Inventorier les consommateurs du score
        shell: bash
        run: |
          set -Eeuo pipefail
          {
            echo '# Usages reliability / nSources'
            echo
            rg -n --glob '!pnpm-lock.yaml' --glob '!docs/screenshots/**' \
              'reliability|nSources' velum/apps velum/packages velum/supabase || true
          } > velum/reliability-usages.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent-audit-reliability.yml
          git add velum/reliability-usages.txt
          git diff --cached --check
          git commit -m "chore(velum): inventorier les usages du score de fiabilité"
          git push origin HEAD:agent/velum-distinct-source-reliability
