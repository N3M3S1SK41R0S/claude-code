name: Nettoyage ponctuel fixture Pièces

on:
  push:
    branches:
      - agent/velum-distinct-source-reliability
    paths:
      - .github/workflows/agent-clean-coin.yml

permissions:
  contents: write

jobs:
  clean-coin-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/velum-distinct-source-reliability
          fetch-depth: 0

      - name: Restaurer les séparateurs sans bruit
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('velum/packages/domains/coin/src/plugin.test.ts')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '// ── Analyse ────────────────────────────────────────────────────────────':
                  '// ── Analyse ───────────────────────────────────────────────────────────────',
              '// ── buildPriceQuery ─────────────────────────────────────────────────────':
                  '// ── buildPriceQuery ───────────────────────────────────────────────────────',
              '// ── Valorisation bout-en-bout avec le moteur RÉEL ───────────────────────':
                  '// ── Valorisation bout-en-bout avec le moteur RÉEL ─────────────────────────',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'motif absent: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent-clean-coin.yml
          git add velum/packages/domains/coin/src/plugin.test.ts
          git diff --cached --check
          git commit -m "test(velum/coin): retirer le bruit de la fixture"
          git push origin HEAD:agent/velum-distinct-source-reliability
