name: Alignement ponctuel du compteur de sources UI

on:
  push:
    branches:
      - agent/velum-distinct-source-reliability
    paths:
      - .github/workflows/agent-fix-source-count-ui.yml

permissions:
  contents: write

jobs:
  align-source-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/velum-distinct-source-reliability
          fetch-depth: 0

      - name: Afficher les plateformes distinctes sur la fiche
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('velum/apps/mobile/app/item/[id].tsx')
          text = path.read_text(encoding='utf-8')
          replacements = {
              "} from '@velum/core';\n\nimport { Screen }":
                  "} from '@velum/core';\nimport { countDistinctSources } from '@velum/valuation';\n\nimport { Screen }",
              "t('item.nSources', { count: valuation.sources.length })":
                  "t('item.nSources', { count: countDistinctSources(valuation.sources) })",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'motif absent: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent-fix-source-count-ui.yml
          git add 'velum/apps/mobile/app/item/[id].tsx'
          git diff --cached --check
          git commit -m "fix(velum/ui): afficher les plateformes distinctes"
          git push origin HEAD:agent/velum-distinct-source-reliability
