name: Nettoyage ponctuel fixture Timbres

on:
  push:
    branches:
      - agent/velum-distinct-source-reliability
    paths:
      - .github/workflows/agent-clean-stamp.yml

permissions:
  contents: write

jobs:
  clean-stamp-fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/velum-distinct-source-reliability
          fetch-depth: 0

      - name: Retirer le bruit et corriger la fixture
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('velum/packages/domains/stamp/src/plugin.test.ts')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '// ── Fixtures de reconnaissance ───────────────────────────────────────────':
                  '// ── Fixtures de reconnaissance ────────────────────────────────────────────',
              "varieties: ['Nuance vert-bleu cotéd séparément', 'Papier GC (Grande Consommation)'],":
                  "varieties: ['Nuance vert-bleu cotée séparément', 'Papier GC (Grande Consommation)'],",
              '// ── Valorisation bout-en-bout avec le moteur RÉEL ────────────────────────':
                  '// ── Valorisation bout-en-bout avec le moteur RÉEL ─────────────────────────',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'motif absent: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent-clean-stamp.yml
          git add velum/packages/domains/stamp/src/plugin.test.ts
          git diff --cached --check
          git commit -m "test(velum/stamp): nettoyer la fixture de valorisation"
          git push origin HEAD:agent/velum-distinct-source-reliability
