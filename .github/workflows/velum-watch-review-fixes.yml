name: VELUM — corrections finales Montres

on:
  push:
    branches:
      - claude/velum-production-spec-1lyh3m
    paths:
      - .github/workflows/velum-watch-review-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/velum-production-spec-1lyh3m
          fetch-depth: 0

      - name: Appliquer les correctifs de revue
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch origin claude/velum-production-spec-1lyh3m
          git reset --hard origin/claude/velum-production-spec-1lyh3m

          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def read(path: str) -> str:
              return Path(path).read_text(encoding='utf-8')

          def write(path: str, content: str) -> None:
              Path(path).parent.mkdir(parents=True, exist_ok=True)
              Path(path).write_text(content, encoding='utf-8')

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{path}: motif attendu une fois, trouvé {count}: {old[:120]!r}')
              write(path, text.replace(old, new, 1))

          # 1. Fiche montre : aucun accès direct à .length/.map sur du JSONB non validé.
          watch_sheet = 'velum/apps/mobile/components/sheets/WatchSheet.tsx'
          replacements = {
              '{movement.complications.length > 0 ? (': '{Array.isArray(movement.complications) && movement.complications.length > 0 ? (',
              "{story && (story.why || story.byWhom || story.modelLaunchYear !== undefined || story.milestones?.length) ? (": "{story && (story.why || story.byWhom || story.modelLaunchYear !== undefined || (Array.isArray(story.milestones) && story.milestones.length > 0)) ? (",
              '{story.milestones && story.milestones.length > 0 ? (': '{Array.isArray(story.milestones) && story.milestones.length > 0 ? (',
              '{condition.nonOriginalParts && condition.nonOriginalParts.length > 0 ? (': '{Array.isArray(condition.nonOriginalParts) && condition.nonOriginalParts.length > 0 ? (',
              '{condition.issues.length > 0 ? <Bullets items={condition.issues} /> : null}': '{Array.isArray(condition.issues) && condition.issues.length > 0 ? <Bullets items={condition.issues} /> : null}',
              '{neighborReferences && neighborReferences.length > 0 ? (': '{Array.isArray(neighborReferences) && neighborReferences.length > 0 ? (',
              '{uncertainties && uncertainties.length > 0 ? (': '{Array.isArray(uncertainties) && uncertainties.length > 0 ? (',
          }
          for old, new in replacements.items():
              replace_once(watch_sheet, old, new)

          # 2. Plugin : confiance honnête, attributs validés et fusion fallback/analyse.
          plugin = 'velum/packages/domains/watch/src/plugin.ts'
          replace_once(plugin, "import { clamp01, isRecord, parseLooseJson } from './json.ts';", "import { isRecord, parseLooseJson } from './json.ts';")
          replace_once(
              plugin,
              '  "L\'authenticité (mouvement, cadran, pièces d\'origine) n\'est PAS vérifiée : le marché horloger est exposé aux contrefaçons et aux montres recomposées — en cas de doute, consultez un expert.",',
              "  'L’authenticité (mouvement, cadran, pièces d’origine) n’est PAS vérifiée : le marché horloger est exposé aux contrefaçons et aux montres recomposées — en cas de doute, consultez un expert.',",
          )

          text = read(plugin)
          start = text.index('function finitePositive(v: unknown): number | undefined {')
          end = text.index('\nfunction toMovement(v: unknown): WatchMovement {', start)
          helper_block = dedent('''
          function finitePositive(v: unknown): number | undefined {
            return typeof v === 'number' && Number.isFinite(v) && v > 0 ? v : undefined;
          }

          /** Confiance finie dans [0,1], sinon repli conservateur. */
          function confidenceOr(value: unknown, fallback: number): number {
            return typeof value === 'number' && Number.isFinite(value) && value >= 0 && value <= 1
              ? value
              : fallback;
          }

          /** Parse uniquement les attributs horlogers connus et valides. */
          function parseWatchAttributes(value: unknown): WatchAttributes {
            const src = isRecord(value) ? value : {};
            const out: WatchAttributes = {};
            const copyString = (key: keyof WatchAttributes): void => {
              const raw = src[key];
              if (typeof raw === 'string' && raw.trim().length > 0) {
                (out as Record<string, unknown>)[key] = raw.trim();
              }
            };

            copyString('brand');
            copyString('model');
            copyString('reference');
            copyString('caseMaterial');
            copyString('dialColor');
            copyString('bracelet');
            copyString('crystal');
            copyString('limitedEdition');

            if (typeof src['year'] === 'number' && Number.isFinite(src['year'])) out.year = src['year'];
            if (
              typeof src['gender'] === 'string' &&
              (GENDER_VALUES as readonly string[]).includes(src['gender'])
            ) {
              out.gender = src['gender'] as WatchAttributes['gender'];
            }
            const diameter = finitePositive(src['caseDiameterMm']);
            if (diameter !== undefined) out.caseDiameterMm = diameter;
            const water = finitePositive(src['waterResistanceM']);
            if (water !== undefined) out.waterResistanceM = water;
            if (
              typeof src['boxPapers'] === 'string' &&
              (BOX_PAPERS_VALUES as readonly string[]).includes(src['boxPapers'])
            ) {
              out.boxPapers = src['boxPapers'] as WatchAttributes['boxPapers'];
            }
            return out;
          }

          /** Attributs sûrs conservés dans Candidate, avec l'état textuel utile à la cote. */
          function candidateAttributes(value: unknown): Record<string, unknown> {
            const src = isRecord(value) ? value : {};
            const out: Record<string, unknown> = { ...parseWatchAttributes(src) };
            const rawCondition = src['condition'] ?? src['etat'];
            if (typeof rawCondition === 'string' && rawCondition.trim().length > 0) {
              out['condition'] = rawCondition.trim();
            }
            return out;
          }

          /** Confiance d'import dérivée des identifiants réellement présents. */
          function importConfidence(attributes: Record<string, unknown>): number {
            const hasBrand = typeof attributes['brand'] === 'string';
            const hasModel = typeof attributes['model'] === 'string';
            const hasReference = typeof attributes['reference'] === 'string';
            if (hasBrand && hasModel && hasReference) return 0.95;
            if (hasReference && (hasBrand || hasModel)) return 0.9;
            if (hasBrand && hasModel) return 0.85;
            if (hasReference) return 0.75;
            if (hasBrand || hasModel) return 0.5;
            return 0.2;
          }

          /** Superpose les champs d'analyse validés aux identifiants déjà connus. */
          function toIdentification(v: unknown, fallback: Record<string, unknown>): WatchAttributes {
            return {
              ...parseWatchAttributes(fallback),
              ...parseWatchAttributes(v),
            };
          }
          ''').strip()
          write(plugin, text[:start] + helper_block + text[end:])

          replace_once(
              plugin,
              "    const rawConfidence = entry['confidence'];\n    const confidence = clamp01(typeof rawConfidence === 'number' ? rawConfidence : 0);\n    const attributes = isRecord(entry['attributes']) ? entry['attributes'] : {};\n    out.push({ id: nextCandidateId(), domain: 'watch', label, confidence, attributes });",
              "    const rawConfidence = entry['confidence'];\n    if (\n      typeof rawConfidence !== 'number' ||\n      !Number.isFinite(rawConfidence) ||\n      rawConfidence < 0 ||\n      rawConfidence > 1\n    ) {\n      continue;\n    }\n    const attributes = candidateAttributes(entry['attributes']);\n    out.push({ id: nextCandidateId(), domain: 'watch', label, confidence: rawConfidence, attributes });",
          )
          replace_once(
              plugin,
              "    const confidence = clamp01(typeof src['confidence'] === 'number' ? src['confidence'] : 0.3);",
              "    const confidence = confidenceOr(src['confidence'], 0.3);",
          )
          replace_once(
              plugin,
              "      const candidates: Candidate[] = rows.map((row) => ({\n        id: nextCandidateId(),\n        domain: 'watch' as const,\n        label: fileRowLabel(row),\n        confidence: 0.95,\n        attributes: row,\n      }));\n      return { candidates, stage: 'assisted', needsAssistedEntry: candidates.length === 0 };",
              "      const candidates: Candidate[] = rows.map((row) => {\n        const attributes = candidateAttributes(row);\n        return {\n          id: nextCandidateId(),\n          domain: 'watch' as const,\n          label: fileRowLabel(row),\n          confidence: importConfidence(attributes),\n          attributes,\n        };\n      });\n      return {\n        candidates,\n        stage: 'assisted',\n        needsAssistedEntry:\n          candidates.length === 0 ||\n          candidates.some((candidate) => candidate.confidence < ASSISTED_ENTRY_THRESHOLD),\n      };",
          )
          replace_once(
              plugin,
              "    const confidence = clamp01(typeof rawConfidence === 'number' ? rawConfidence : condition.confidence);",
              "    const confidence = confidenceOr(rawConfidence, condition.confidence);",
          )

          # 3. Tests du plugin alignés sur les garanties de confiance et de fusion.
          plugin_test = 'velum/packages/domains/watch/src/plugin.test.ts'
          replace_once(plugin_test, "    // Tri décroissant, confiance bornée à 1, top 3.\n    expect(result.stage).toBe('llm_vision');\n    expect(result.candidates).toHaveLength(3);\n    expect(result.candidates.map((c) => c.confidence)).toEqual([1, 0.64, 0.41]);\n    expect(result.candidates[0]?.label).toBe('Rolex Submariner 114060');\n    expect(result.candidates[1]?.attributes['brand']).toBe('Rolex');", "    // Tri décroissant, confiance hors [0,1] rejetée, top 3.\n    expect(result.stage).toBe('llm_vision');\n    expect(result.candidates).toHaveLength(3);\n    expect(result.candidates.map((c) => c.confidence)).toEqual([0.64, 0.41, 0.12]);\n    expect(result.candidates[0]?.label).toBe('Rolex Submariner 124060');\n    expect(result.candidates[0]?.attributes['brand']).toBe('Rolex');")
          replace_once(plugin_test, "  it('mappe chaque ligne en candidat (confiance 0.95, stage assisted)', async () => {", "  it('dérive une confiance honnête des identifiants réellement importés', async () => {")
          replace_once(plugin_test, "    expect(result.stage).toBe('assisted');\n    expect(result.needsAssistedEntry).toBe(false);\n    expect(result.candidates).toHaveLength(3);\n    expect(result.candidates[0]?.confidence).toBe(0.95);\n    expect(result.candidates[0]?.label).toBe('Rolex Submariner 124060');\n    expect(result.candidates[0]?.attributes).toEqual(rows[0]);\n    expect(result.candidates[1]?.label).toBe('Cartier Tank Must WSTA0041');\n    expect(result.candidates[2]?.label).toBe('Montre importée (à préciser)');", "    expect(result.stage).toBe('assisted');\n    expect(result.needsAssistedEntry).toBe(true);\n    expect(result.candidates).toHaveLength(3);\n    expect(result.candidates[0]?.confidence).toBe(0.95);\n    expect(result.candidates[0]?.label).toBe('Rolex Submariner 124060');\n    expect(result.candidates[0]?.attributes).toEqual(rows[0]);\n    expect(result.candidates[1]?.label).toBe('Cartier Tank Must WSTA0041');\n    expect(result.candidates[1]?.confidence).toBe(0.2);\n    expect(result.candidates[2]?.label).toBe('Montre importée (à préciser)');\n    expect(result.candidates[2]?.confidence).toBe(0.2);")
          replace_once(plugin_test, "        movement: { type: 'solaire' }, // hors référentiel → 'inconnu'\n        condition: {},\n        uncertainties: ['référence exacte à confirmer'],", "        identification: { model: 'Submariner Date' },\n        movement: { type: 'solaire' }, // hors référentiel → 'inconnu'\n        condition: { confidence: 1.6 },\n        uncertainties: ['référence exacte à confirmer'],\n        confidence: 1.6,")
          replace_once(plugin_test, "    const result = await watchPlugin.analyze(candidate({ brand: 'Rolex', model: 'Submariner' }), {", "    const result = await watchPlugin.analyze(candidate({ brand: 'Rolex', model: 'Submariner', reference: '124060' }), {")
          replace_once(plugin_test, "    expect(result.payload.identification.brand).toBe('Rolex');\n    expect(result.payload.movement.type).toBe('inconnu');", "    expect(result.payload.identification.brand).toBe('Rolex');\n    expect(result.payload.identification.model).toBe('Submariner Date');\n    expect(result.payload.identification.reference).toBe('124060');\n    expect(result.payload.movement.type).toBe('inconnu');")

          # 4. Horloge obligatoire et limiteur WatchCharts partagé par clé.
          transport_path = 'velum/packages/domains/watch/src/sources/transport.ts'
          replace_once(transport_path, "  /** Horloge injectable (défaut : () => new Date()) pour des tests déterministes. */\n  now?: () => Date;", "  /** Horloge injectée par l'appelant : aucune dépendance temporelle implicite. */\n  now: () => Date;")

          for source_path in [
              'velum/packages/domains/watch/src/sources/heritage.ts',
              'velum/packages/domains/watch/src/sources/ebaySold.ts',
              'velum/packages/domains/watch/src/sources/catawiki.ts',
              'velum/packages/domains/watch/src/sources/chrono24.ts',
          ]:
              replace_once(source_path, '    this.now = options.now ?? (() => new Date());', '    this.now = options.now;')

          watchcharts = dedent('''
          /**
           * Adaptateur WatchCharts — cote de marché par marque + référence.
           *
           * Contrat officiel v3 : résolution UUID puis lecture de la cote. Chaque
           * requête utilise `x-api-key`. Le limiteur est partagé par clé entre toutes
           * les instances afin que le cron ne puisse jamais dépasser une requête par
           * seconde, même lors de traitements concurrents.
           */
          import {
            DEFAULT_SOURCE_WEIGHTS,
            type PriceObservation,
            type PriceQuery,
            type PriceSource,
          } from '@velum/core';
          import { isRecord } from '../json.ts';
          import {
            ageDaysFromIso,
            toPositiveNumber,
            type SourceAdapterOptions,
            type Transport,
          } from './transport.ts';

          const WATCHCHARTS_SEARCH_URL = 'https://api.watchcharts.com/v3/search/watch';
          const WATCHCHARTS_INFO_URL = 'https://api.watchcharts.com/v3/watch/info';
          const REQUEST_INTERVAL_MS = 1_100;

          type RequestInit = { headers?: Record<string, string>; query?: Record<string, string> };
          type Wait = (milliseconds: number) => Promise<void>;

          /** Queue partagée : la promesse de queue ne se résout qu'après le cooldown. */
          const requestQueues = new Map<string, Promise<void>>();

          async function serializedForKey<T>(
            key: string,
            request: () => Promise<T>,
            wait: Wait,
          ): Promise<T> {
            const previous = requestQueues.get(key) ?? Promise.resolve();
            let release = (): void => undefined;
            const slot = new Promise<void>((resolve) => {
              release = resolve;
            });
            const tail = previous.catch(() => undefined).then(() => slot);
            requestQueues.set(key, tail);

            await previous.catch(() => undefined);
            try {
              return await request();
            } finally {
              try {
                await wait(REQUEST_INTERVAL_MS);
              } finally {
                release();
                if (requestQueues.get(key) === tail) requestQueues.delete(key);
              }
            }
          }

          function nonEmptyString(value: unknown): string | null {
            return typeof value === 'string' && value.trim().length > 0 ? value.trim() : null;
          }

          function firstWatchUuid(raw: unknown): string | null {
            if (!isRecord(raw) || !Array.isArray(raw['results'])) return null;
            for (const result of raw['results']) {
              if (!isRecord(result)) continue;
              const uuid = nonEmptyString(result['uuid']);
              if (uuid !== null) return uuid;
            }
            return null;
          }

          function matchedLabel(raw: Record<string, unknown>, fallback: string): string {
            const parts = [raw['brand'], raw['collection'], raw['model']]
              .map(nonEmptyString)
              .filter((value): value is string => value !== null);
            return parts.length > 0 ? parts.join(' ') : fallback;
          }

          export class WatchChartsSource implements PriceSource {
            readonly name = 'WatchCharts';
            readonly kind = 'official_quote' as const;
            private readonly transport: Transport;
            private readonly apiKey: string | undefined;
            private readonly now: () => Date;
            private readonly wait: Wait;

            constructor(options: SourceAdapterOptions) {
              this.transport = options.transport;
              this.apiKey = options.apiKey;
              this.now = options.now;
              this.wait = options.wait ?? ((milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds)));
            }

            private async getJsonRateLimited(
              apiKey: string,
              url: string,
              init: RequestInit,
            ): Promise<unknown> {
              return serializedForKey(
                apiKey,
                () => this.transport.getJson(url, init),
                this.wait,
              );
            }

            async fetch(query: PriceQuery): Promise<PriceObservation[]> {
              const brand = nonEmptyString(query.attributes['brand']);
              const reference = nonEmptyString(query.attributes['reference']);
              const apiKey = nonEmptyString(this.apiKey);
              if (brand === null || reference === null || apiKey === null) return [];

              const headers = { 'x-api-key': apiKey };
              try {
                const search = await this.getJsonRateLimited(apiKey, WATCHCHARTS_SEARCH_URL, {
                  headers,
                  query: { brand_name: brand, reference, exact_match: 'true' },
                });
                const uuid = firstWatchUuid(search);
                if (uuid === null) return [];

                const info = await this.getJsonRateLimited(apiKey, WATCHCHARTS_INFO_URL, {
                  headers,
                  query: { uuid, currency: 'EUR' },
                });
                if (!isRecord(info)) return [];
                const price = toPositiveNumber(info['market_price']);
                if (price === null) return [];

                return [{
                  price,
                  currency: 'EUR',
                  ageDays: ageDaysFromIso(info['updated'], this.now) ?? 0,
                  sourceWeight: DEFAULT_SOURCE_WEIGHTS[this.kind],
                  source: { name: this.name, kind: this.kind, url: WATCHCHARTS_INFO_URL },
                  matchedLabel: matchedLabel(info, query.label),
                }];
              } catch {
                return [];
              }
            }
          }
          ''').strip() + '\n'
          write('velum/packages/domains/watch/src/sources/watchCharts.ts', watchcharts)

          sources_test = 'velum/packages/domains/watch/src/sources.test.ts'
          replace_once(
              sources_test,
              "class SequenceTransport implements Transport {\n  readonly calls: { url: string; init?: GetJsonInit }[] = [];\n  private readonly responses: unknown[];\n\n  constructor(responses: unknown[]) {\n    this.responses = [...responses];\n  }\n\n  async getJson(url: string, init?: GetJsonInit): Promise<unknown> {\n    this.calls.push({ url, init });\n    if (this.responses.length === 0) throw new Error('fixture épuisée');\n    return this.responses.shift();\n  }\n}",
              "class SequenceTransport implements Transport {\n  readonly calls: { url: string; init?: GetJsonInit }[] = [];\n  private readonly responses: unknown[];\n\n  constructor(responses: unknown[]) {\n    this.responses = [...responses];\n  }\n\n  async getJson(url: string, init?: GetJsonInit): Promise<unknown> {\n    this.calls.push({ url, init });\n    if (this.responses.length === 0) throw new Error('fixture épuisée');\n    return this.responses.shift();\n  }\n}\n\n/** Mesure le parallélisme réseau réel entre plusieurs instances. */\nclass ConcurrencyProbeTransport implements Transport {\n  readonly calls: { url: string; init?: GetJsonInit }[] = [];\n  active = 0;\n  maxActive = 0;\n\n  async getJson(url: string, init?: GetJsonInit): Promise<unknown> {\n    this.calls.push({ url, init });\n    this.active += 1;\n    this.maxActive = Math.max(this.maxActive, this.active);\n    await Promise.resolve();\n    this.active -= 1;\n    return url.endsWith('/search/watch')\n      ? { success: true, results: [{ uuid: 'watch-uuid' }] }\n      : { brand: 'Rolex', collection: 'Submariner', model: '124060', market_price: 11500 };\n  }\n}",
          )
          marker = "  it('applique aussi le cooldown après réponse vide, info invalide ou panne', async () => {"
          text = read(sources_test)
          start = text.index(marker)
          end = text.index("\n  });\n});\n\ndescribe('EbaySoldSource'", start) + len("\n  });")
          concurrency_test = dedent('''

            it('sérialise les requêtes de deux instances partageant la même clé', async () => {
              const transport = new ConcurrencyProbeTransport();
              const options = {
                transport,
                apiKey: 'shared-key',
                now: NOW,
                wait: async () => {
                  await Promise.resolve();
                },
              };
              await Promise.all([
                new WatchChartsSource(options).fetch(QUERY),
                new WatchChartsSource(options).fetch(QUERY),
              ]);
              expect(transport.maxActive).toBe(1);
              expect(transport.calls).toHaveLength(4);
            });
          ''')
          write(sources_test, text[:end] + concurrency_test + text[end:])

          domains = 'velum/supabase/functions/_shared/domains.ts'
          replace_once(domains, "    case 'watch': {\n      const sources: PriceSource[] = [];", "    case 'watch': {\n      const sources: PriceSource[] = [];\n      const now = () => new Date();")
          for old, new in {
              'new WatchChartsSource({ transport, apiKey: watchCharts })': 'new WatchChartsSource({ transport, apiKey: watchCharts, now })',
              'new WatchHeritageSource({ transport, apiKey: heritage })': 'new WatchHeritageSource({ transport, apiKey: heritage, now })',
              'new WatchEbaySoldSource({ transport, apiKey: ebay })': 'new WatchEbaySoldSource({ transport, apiKey: ebay, now })',
              'new WatchCatawikiSource({ transport, apiKey: catawiki })': 'new WatchCatawikiSource({ transport, apiKey: catawiki, now })',
              'new Chrono24Source({ transport, apiKey: chrono24 })': 'new Chrono24Source({ transport, apiKey: chrono24, now })',
          }.items():
              replace_once(domains, old, new)

          # 5. Seed : indexation strictement gardée.
          seed = 'velum/supabase/functions/calibration/seed.ts'
          replace_once(seed, "    let skipped = 0;\n\n    for (const query of benchmarks[domain]) {", "    let skipped = 0;\n    const queries = benchmarks[domain];\n    if (!queries) continue;\n\n    for (const query of queries) {")

          # 6. Rôles Storage des montres : migration additive et preuve SQL.
          migration = dedent('''
          -- Étend le contrat item_media.kind aux rôles du module Montres.
          -- Migration idempotente : remplace uniquement les CHECK portant sur `kind`.
          do $migration$
          declare
            constraint_name text;
          begin
            for constraint_name in
              select distinct c.conname
              from pg_constraint c
              join lateral unnest(c.conkey) as key_column(attnum) on true
              join pg_attribute a
                on a.attrelid = c.conrelid
               and a.attnum = key_column.attnum
              where c.conrelid = 'public.item_media'::regclass
                and c.contype = 'c'
                and a.attname = 'kind'
            loop
              execute format('alter table public.item_media drop constraint %I', constraint_name);
            end loop;
          end
          $migration$;

          alter table public.item_media
            add constraint item_media_kind_check
            check (
              kind in (
                'label', 'capsule', 'obverse', 'reverse', 'edge',
                'front', 'back', 'signature', 'frame', 'detail',
                'dial', 'caseback', 'movement', 'clasp'
              )
            );
          ''').strip() + '\n'
          write('velum/supabase/migrations/20260717160000_watch_media_roles.sql', migration)

          media_checks = dedent('''
          do $checks$
          declare
            definition text;
            required_role text;
          begin
            select pg_get_constraintdef(c.oid)
              into definition
              from pg_constraint c
              where c.conrelid = 'public.item_media'::regclass
                and c.conname = 'item_media_kind_check';

            if definition is null then
              raise exception 'item_media_kind_check absent';
            end if;

            foreach required_role in array array['dial', 'caseback', 'movement', 'clasp']
            loop
              if position(quote_literal(required_role) in definition) = 0 then
                raise exception 'rôle média montre absent du CHECK: %', required_role;
              end if;
            end loop;
          end
          $checks$;
          ''').strip() + '\n'
          write('velum/supabase/tests/watch_media_checks.sql', media_checks)

          run_local = 'velum/supabase/tests/run-local.sh'
          replace_once(run_local, "echo \"· tests du remplacement atomique des preuves de calibration\"", "echo \"· tests des rôles médias du module Montres\"\nrun_sql_file \"tests des rôles médias du module Montres\" supabase/tests/watch_media_checks.sql\n\necho \"· tests du remplacement atomique des preuves de calibration\"")

          database = 'velum/docs/DATABASE.md'
          replace_once(database, "| `kind` | `text` CHECK in (`label`,`capsule`,`obverse`,`reverse`,`edge`,`front`,`back`,`signature`,`frame`,`detail`) | = `MediaRole` |", "| `kind` | `text` CHECK in (`label`,`capsule`,`obverse`,`reverse`,`edge`,`front`,`back`,`signature`,`frame`,`detail`,`dial`,`caseback`,`movement`,`clasp`) | = `MediaRole` |")
          replace_once(database, "Fiches d'analyse produites par les moteurs (`zappa_vini`, `numis_v1`, `art_v1`, `phila_v1`).", "Fiches d'analyse produites par les moteurs (`zappa_vini`, `numis_v1`, `art_v1`, `phila_v1`, `watch_v1`).")

