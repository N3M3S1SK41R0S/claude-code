name: VELUM CI

on:
  push:
    paths:
      - "velum/**"
      - ".github/workflows/velum-ci.yml"
      - ".github/workflows/velum-supabase-deploy.yml"
  pull_request:
    paths:
      - "velum/**"
      - ".github/workflows/velum-ci.yml"
      - ".github/workflows/velum-supabase-deploy.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: velum
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: velum/pnpm-lock.yaml

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Typecheck (12 packages, TypeScript strict)
        run: pnpm typecheck

      - name: Lint (12 packages)
        run: pnpm lint

      - name: Tests unitaires (vitest)
        run: pnpm test

      - name: Export web (PWA)
        working-directory: velum/apps/mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
        run: npx expo export --platform web

      - name: Installer Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: E2E de fumée PWA (Chromium réel)
        run: node e2e/web-smoke.mjs

      - name: Rendu des écrans authentifiés (stub réseau) + captures stores
        run: node e2e/auth-screens.mjs

      - name: Audit accessibilité WCAG 2.2 AA (axe-core)
        run: node e2e/a11y-audit.mjs

      - name: Preuve du mode senior (agrandissement effectif du rendu)
        run: node e2e/senior-screens.mjs

      - name: Preuve du hors-ligne (collection lue depuis le cache persisté)
        run: node e2e/offline.mjs

      # EN DERNIER : l'export démo écrase dist/ ; --clear est OBLIGATOIRE car
      # le cache Metro fige l'inlining des EXPO_PUBLIC_* du build précédent.
      - name: Export web en MODE DÉMO
        working-directory: velum/apps/mobile
        env:
          EXPO_PUBLIC_DEMO: "1"
          EXPO_PUBLIC_SUPABASE_URL: https://demo.local
          EXPO_PUBLIC_SUPABASE_ANON_KEY: demo
        run: npx expo export --platform web --clear

      - name: Preuve du mode démo (parcours cœur sans backend)
        run: node e2e/demo-smoke.mjs

  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno check des 12 Edge Functions
        working-directory: velum/supabase/functions
        run: |
          deno check --import-map=import_map.json \
            recognize/index.ts \
            analyze-wine/index.ts analyze-coin/index.ts analyze-art/index.ts analyze-stamp/index.ts \
            valuate/index.ts cellar-pairing/index.ts \
            arbiter/index.ts calibration/index.ts \
            price-cron/index.ts revenuecat-webhook/index.ts delete-account/index.ts

      - name: Tests des Edge Functions (helpers purs + handlers HTTP, fetch stubbé)
        working-directory: velum/supabase/functions
        run: deno test --import-map=import_map.json -A tests/

      - name: Tests du déploiement Supabase (CLI simulée)
        run: bash velum/scripts/deploy-supabase-test.sh

  sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Démarrer PostgreSQL (préinstallé sur le runner)
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "select version();"

      - name: Migrations + RLS + quota + Platine sur Postgres réel
        run: bash velum/supabase/tests/run-local.sh

      - name: Conserver le diagnostic SQL en cas d'échec
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: velum-sql-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/velum-sql-diagnostics.log
          if-no-files-found: error
          retention-days: 7

  deploy-log-diagnostic:
    name: Diagnostic temporaire du premier déploiement
    if: github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Lire uniquement l’étape de publication échouée
        env:
          GH_TOKEN: ${{ github.token }}
          FAILED_JOB_ID: "87561981348"
        run: |
          set -Eeuo pipefail
          log_file="$(mktemp)"
          trap 'rm -f "$log_file"' EXIT
          curl --fail --silent --show-error --location \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/jobs/$FAILED_JOB_ID/logs" \
            --output "$log_file"
          python3 - "$log_file" <<'PY'
          import sys
          from pathlib import Path

          lines = Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace").splitlines()
          markers = (
              "bash scripts/deploy-supabase.sh",
              "Déployer la base et les fonctions",
          )
          starts = [
              index
              for index, line in enumerate(lines)
              if any(marker in line for marker in markers)
          ]
          start = max(starts) - 8 if starts else max(0, len(lines) - 60)
          print("===== ÉTAPE DE PUBLICATION ÉCHOUÉE =====")
          for line in lines[max(0, start):]:
              print(line)
          PY
