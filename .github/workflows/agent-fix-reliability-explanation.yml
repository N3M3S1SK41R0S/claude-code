name: Correction ponctuelle de l’explication de fiabilité

on:
  push:
    branches:
      - agent/velum-distinct-source-reliability
    paths:
      - .github/workflows/agent-fix-reliability-explanation.yml

permissions:
  contents: write

jobs:
  fix-reliability-explanation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/velum-distinct-source-reliability
          fetch-depth: 0

      - name: Replacer le recalcul dans le seul chemin persisté
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'{path}: motif absent: {old!r}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          explain = Path('velum/packages/valuation/src/explain.ts')
          replace_once(
              explain,
              "  if (resolution.differsFromStored) {\n    notes.push(\n      `Score recalculé selon le moteur courant à partir des sources conservées (score enregistré : ${resolution.stored}/100).`,\n    );\n  }\n  notes.push(\n    resolution.recomputed\n      ? `Fiabilité ${resolution.value}/100 = moitié couverture (${Math.round(countScore * 100)} %) + moitié resserrement (${Math.round(tightnessScore * 100)} %).`\n      : `Fiabilité enregistrée ${resolution.value}/100 — détail du calcul indisponible faute de sources conservées.`,\n  );",
              "  notes.push(\n    `Fiabilité ${result.reliability}/100 = moitié couverture (${Math.round(countScore * 100)} %) + moitié resserrement (${Math.round(tightnessScore * 100)} %).`,\n  );",
          )
          replace_once(
              explain,
              "  observations: PriceObservation[];\n  nSources: number;\n}): ValuationExplanation {",
              "  observations: PriceObservation[];\n}): ValuationExplanation {",
          )
          replace_once(
              explain,
              " * (celui persisté et affiché par l'app). Ne re-calcule PAS la valorisation et\n * n'a pas besoin des FX : les observations d'un résultat sont celles CONSERVÉES",
              " * (celui persisté et affiché par l'app). Ne recalcule ni la centrale ni les\n * intervalles, mais résout le score selon le moteur courant à partir des sources\n * conservées. Aucun FX n'est requis : les observations sont celles CONSERVÉES",
          )
          replace_once(
              explain,
              "  notes.push(\n    `Fiabilité ${result.reliability}/100 = moitié couverture (${Math.round(countScore * 100)} %) + moitié resserrement (${Math.round(tightnessScore * 100)} %).`,\n  );\n\n  return {\n    central: result.central,\n    ci80: result.ci80,\n    ci95: result.ci95,\n    reliability: resolution.value,",
              "  if (resolution.differsFromStored) {\n    notes.push(\n      `Score recalculé selon le moteur courant à partir des sources conservées (score enregistré : ${resolution.stored}/100).`,\n    );\n  }\n  notes.push(\n    resolution.recomputed\n      ? `Fiabilité ${resolution.value}/100 = moitié couverture (${Math.round(countScore * 100)} %) + moitié resserrement (${Math.round(tightnessScore * 100)} %).`\n      : `Fiabilité enregistrée ${resolution.value}/100 — détail du calcul indisponible faute de sources conservées.`,\n  );\n\n  return {\n    central: result.central,\n    ci80: result.ci80,\n    ci95: result.ci95,\n    reliability: resolution.value,",
          )

          component = Path('velum/apps/mobile/components/ValuationExplanation.tsx')
          replace_once(component, "              observations: valuation.sources,\n              nSources: 0,", "              observations: valuation.sources,")

          explain_test = Path('velum/packages/valuation/src/explain.test.ts')
          replace_once(explain_test, "                observations,\n                nSources: 4,", "                observations,")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent-fix-reliability-explanation.yml
          git add \
            velum/packages/valuation/src/explain.ts \
            velum/packages/valuation/src/explain.test.ts \
            velum/apps/mobile/components/ValuationExplanation.tsx
          git diff --cached --check
          git commit -m "fix(velum/valuation): isoler le recalcul des scores persistés"
          git push origin HEAD:agent/velum-distinct-source-reliability
