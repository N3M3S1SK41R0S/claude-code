name: Verrou ponctuel du compteur de sources

on:
  push:
    branches:
      - agent/velum-distinct-source-reliability
    paths:
      - .github/workflows/agent-lock-source-count.yml

permissions:
  contents: write

jobs:
  lock-source-count:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/velum-distinct-source-reliability
          fetch-depth: 0

      - name: Aligner les libellés et le parcours rendu
        shell: bash
        run: |
          set -Eeuo pipefail
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('velum/apps/mobile/locales/fr.json'): {
                  '"nSources": "{{count}} observation(s) retenue(s)",':
                      '"nSources": "{{count}} source(s) distincte(s)",',
              },
              Path('velum/apps/mobile/locales/en.json'): {
                  '"nSources": "{{count}} observation(s) retained",':
                      '"nSources": "{{count}} distinct source(s)",',
              },
              Path('velum/e2e/auth-screens.mjs'): {
                  "await screen('08-fiche-vin', '/item/demo-wine', 'Bandol Domaine Tempier 2016');":
                      "await screen('08-fiche-vin', '/item/demo-wine', 'Bandol Domaine Tempier 2016', async () => {\n  await page.getByText(/3 source/).waitFor({ state: 'visible' });\n});",
              },
          }

          for path, mapping in replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in mapping.items():
                  if old not in text:
                      raise SystemExit(f'{path}: motif absent: {old!r}')
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent-lock-source-count.yml
          git add velum/apps/mobile/locales/fr.json velum/apps/mobile/locales/en.json velum/e2e/auth-screens.mjs
          git diff --cached --check
          git commit -m "test(velum/ui): verrouiller les plateformes distinctes au rendu"
          git push origin HEAD:agent/velum-distinct-source-reliability
